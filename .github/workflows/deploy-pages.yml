# Builds Vite → pushes only dist/ to branch `gh-pages`.
# Browsers never see .jsx; they get compiled /assets/*.js.
#
# GitHub: Settings → Pages → Build: Deploy from a branch
#         Branch: gh-pages  /  folder: / (root)
# After the first successful run, pick `gh-pages` from the branch dropdown.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
